{{- if .Values.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Values.secret.name }}
stringData:
{{- if .Values.secret.accessKey }}
  accessKeyID: {{ .Values.secret.accessKey }}
{{- end }}
{{- if .Values.secret.secretKey }}
  secretAccessKey: {{ .Values.secret.secretKey }}
{{- end }}
  endpoint: {{ .Values.secret.endpoint }}
{{- if .Values.secret.region }}
  region: {{ .Values.secret.region }}
{{- end }}
{{- if .Values.secret.useIRSA }}
  useIRSA: "true"
{{- end }}
{{- if .Values.secret.roleArn }}
  roleArn: {{ .Values.secret.roleArn }}
{{- end }}
{{- if .Values.secret.webIdentityTokenFile }}
  webIdentityTokenFile: {{ .Values.secret.webIdentityTokenFile }}
{{- end }}
{{- end -}}
